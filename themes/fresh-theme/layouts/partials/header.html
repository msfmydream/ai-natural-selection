<header class="header">
    <div class="container">
        <nav class="nav">
            <a href="{{ "/" | relURL }}" class="logo">
                <span class="logo__icon">🚀</span>
                <span class="logo__text">{{ .Site.Title }}</span>
            </a>
            
            <button class="nav__toggle" aria-label="Toggle navigation" onclick="toggleNav()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <ul class="nav__menu" id="navMenu">
                {{ range .Site.Menus.main }}
                <li class="nav__item">
                    <a href="{{ .URL | relURL }}" class="nav__link{{ if $.IsMenuCurrent "main" . }} nav__link--active{{ end }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>
    </div>
</header>
