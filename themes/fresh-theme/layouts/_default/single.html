{{ define "main" }}
<article class="article">
    <div class="container container--narrow">
        <header class="article__header">
            <h1 class="article__title">{{ .Title }}</h1>
            {{ if .Description }}
            <p class="article__description">{{ .Description }}</p>
            {{ end }}
        </header>
        
        <div class="article__content markdown-body">
            {{ .Content }}
        </div>
    </div>
</article>
{{ end }}
